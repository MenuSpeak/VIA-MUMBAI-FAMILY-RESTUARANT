<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>VIA MUMBAI - Family Restaurant</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0d;
            --surface: #0f1114;
            --muted: #9aa0a6;
            --gold1: #d4af37;
            --gold2: #ffcc66;
            --accent: linear-gradient(90deg, var(--gold1), var(--gold2));
            --glass: rgba(255, 255, 255, 0.03);
            --card-radius: 16px;
            --shadow: 0 10px 30px rgba(2, 6, 23, 0.6);
            --maxw: 1200px;
            --gap: 20px;
            --ff-heading: 'Playfair Display', serif;
            --ff-ui: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            --orange: #ff9800;
            --green: #4CAF50;
            --veg-green: #2e7d32;
            --nonveg-red: #c62828;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-size: 16px; }
        body {
            position: relative;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('bg.png') no-repeat center center/cover;
            filter: grayscale(100%);
            opacity: 0.5;
            z-index: -1;
        }
        body {
            background: radial-gradient(1200px 600px at 10% 10%, rgba(212, 175, 55, 0.06), transparent 6%),
                        radial-gradient(1000px 500px at 95% 90%, rgba(255, 204, 102, 0.04), transparent 8%),
                        var(--bg);
            color: #e8e6e3;
            font-family: var(--ff-ui);
            -webkit-font-smoothing: antialiased;
            padding: 16px;
            display: flex;
            justify-content: center;
            line-height: 1.5;
        }
        .container { width: 100%; max-width: var(--maxw); display: flex; flex-direction: column; gap: var(--gap); }
        .cafe-header { text-align: center; margin-bottom: 30px; padding: 20px 0; }
        .cafe-name {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--gold1);
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
            line-height: 1;
            margin-bottom: 5px;
            position: relative;
            display: inline-block;
        }
        .cafe-name::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 2px;
            background: var(--gold1);
        }
        .cafe-subtitle { font-size: 1.2rem; color: var(--orange); letter-spacing: 3px; text-transform: uppercase; font-weight: 700; margin-top: 10px; }
        .mobile-numbers { color: #ffffff; font-weight: 700; font-size: 1.05rem; margin-bottom: 15px; }
        .veg-nonveg { display: flex; justify-content: center; gap: 30px; margin-top: 20px; cursor: pointer; }
        .veg, .nonveg {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            padding: 12px 28px;
            border-radius: 50px;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }
        .veg { color: var(--veg-green); background: rgba(46, 125, 50, 0.15); border: 1px solid rgba(76, 175, 80, 0.3); }
        .nonveg { color: var(--nonveg-red); background: rgba(198, 40, 40, 0.15); border: 1px solid rgba(244, 67, 54, 0.3); }
        .veg.active-filter, .nonveg.active-filter {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--gold1);
            color: var(--gold2);
        }
        .veg.active-filter .symbol, .nonveg.active-filter .symbol {
            transform: scale(1.1);
        }
        .symbol { width: 18px; height: 18px; border-radius: 50%; display: inline-block; }
        .veg .symbol { background: #4caf50; border: 2px solid var(--veg-green); }
        .nonveg .symbol { background: #f44336; border: 2px solid var(--nonveg-red); }
        
        .search-container { background: var(--glass); backdrop-filter: blur(6px); padding: 12px; border-radius: 12px; display: flex; gap: 10px; width: 100%; margin-bottom: 16px; }
        .search-container input { background: transparent; border: 0; outline: 0; color: inherit; font-size: 16px; width: 100%; }
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 20px; }
        .card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 24px rgba(2, 6, 23, 0.6);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(2, 6, 23, 0.8);
        }
        .card-header { display: flex; gap: 20px; }
        .thumb { 
            width: 140px; 
            height: 140px; 
            border-radius: 12px; 
            overflow: hidden; 
            flex-shrink: 0; 
            background: #1a1c20;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s; }
        .card:hover .thumb img { transform: scale(1.05); }
        .card-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .dish { font-size: 18px; font-weight: 700; margin: 0 0 6px 0; font-family: var(--ff-heading); color: var(--gold2); }
        .desc { color: var(--muted); font-size: 13px; margin-top: 4px; line-height: 1.4; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 8px; }
        .price { font-weight: 800; font-size: 18px; color: var(--gold2); }
        .pill { padding: 3px 8px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.1); font-size: 11px; color: var(--muted); background: rgba(0,0,0,0.3); }
        .veg-tag-pill { background: rgba(76, 175, 80, 0.2); color: #4caf50; border-color: #4caf50; }
        .nonveg-tag-pill { background: rgba(244, 67, 54, 0.2); color: #f44336; border-color: #f44336; }
        .cart-qty-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .qty-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            color: var(--gold2);
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .qty-btn:hover { background: rgba(212,175,55,0.4); transform: scale(1.05); }
        .qty-number { font-weight: 700; min-width: 28px; text-align: center; color: white; font-size: 16px; }
        .cart-container { position: fixed; bottom: 20px; right: 20px; z-index: 100; }
        .cart-button {
            background: linear-gradient(90deg, var(--gold1), var(--gold2));
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            border: none;
            box-shadow: 0 8px 30px rgba(212, 175, 55, 0.3);
        }
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e74c3c;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 11, 13, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            padding: 16px;
        }
        .cart-modal.open { opacity: 1; visibility: visible; }
        .cart-content {
            background: var(--surface);
            width: 100%;
            max-width: 500px;
            border-radius: var(--card-radius);
            padding: 20px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 12px; margin-bottom: 16px; }
        .cart-title { font-family: var(--ff-heading); font-size: 22px; color: var(--gold2); }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .item-name { font-weight: 600; font-size: 14px; }
        .item-price { color: var(--gold2); font-size: 13px; }
        .cart-item-qty { display: flex; align-items: center; gap: 8px; }
        .cart-qty-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            color: var(--gold2);
            cursor: pointer;
            font-weight: bold;
        }
        .cart-total { display: flex; justify-content: space-between; padding: 16px 0; font-weight: 600; font-size: 18px; border-top: 1px solid rgba(255,255,255,0.03); margin-top: 12px; }
        .btn-whatsapp {
            background: #25D366;
            border: none;
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }
        .btn-clear {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 12px;
            color: var(--muted);
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        .delivery-options { margin: 16px 0; background: rgba(255,255,255,0.02); padding: 12px; border-radius: 12px; }
        .option-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 12px;
            border-radius: 30px;
            color: var(--muted);
            cursor: pointer;
            margin-right: 8px;
        }
        .option-btn.active { background: var(--gold1); color: #0b0b0d; border-color: var(--gold1); }
        .delivery-form { margin-top: 12px; display: none; }
        .delivery-form.active { display: block; }
        .form-input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
        }
        .customer-details-summary { background: rgba(212,175,55,0.1); border-radius: 8px; padding: 12px; margin: 12px 0; display: none; }
        .customer-details-summary.active { display: block; }
        .location-link-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }
        .map-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: linear-gradient(90deg, var(--gold1), var(--gold2));
            color: #0b0b0d;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
        }
        @media (min-width: 768px) { .menu-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .menu-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>

<div class="container">
    <div class="cafe-header">
        <img src="logo.png" alt="Logo" style="width:300px; height:auto; display:block; margin:0 auto;">
        <div class="cafe-name"></div>
        <div class="cafe-subtitle"></div>
        <div class="mobile-numbers"><br> Mo no.+91 7777012727 / 7777067733</div>
        <div class="veg-nonveg" id="vegNonvegFilters">
            <div class="veg active-filter" data-filter-type="veg"><span class="symbol"></span><span>🌱 VEG ITEMS</span></div>
            <div class="nonveg" data-filter-type="nonveg"><span class="symbol"></span><span>🍗 NON VEG ITEMS</span></div>
        </div>
    </div>

    <div class="search-container">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white"><path d="M21 21l-4.35-4.35" stroke-width="1.6"/><circle cx="11" cy="11" r="6" stroke-width="1.6"/></svg>
        <input id="searchInput" placeholder="Search dishes, ingredients..." />
    </div>

    <main class="menu">
        <section class="menu-grid" id="menuGrid"></section>
    </main>

    <div class="location-link-section">
        <div class="map-link-container">
            <a href="https://maps.app.goo.gl/xMFkkZYjs1RjSFkp7" target="_blank" class="map-link">📍 Open in Google Maps</a>
        </div>
    </div>
</div>

<div class="cart-container">
    <button class="cart-button" id="cartButton">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-count" id="cartCount">0</span>
    </button>
</div>

<div class="cart-modal" id="cartModal">
    <div class="cart-content">
        <div class="cart-header"><h3 class="cart-title">Your Order</h3><button class="close-cart" id="closeCart" style="background:none; border:none; color:white; font-size:24px;">&times;</button></div>
        <div class="delivery-options">
            <button class="option-btn active" id="restaurantOptionBtn">🍽️ Dine-in</button>
            <button class="option-btn" id="homeOptionBtn">🏠 Home Delivery</button>
            <div id="restaurantForm" class="delivery-form active"><input type="text" id="tableNumber" class="form-input" placeholder="Table Number (e.g., Table 5)"></div>
            <div id="homeDeliveryForm" class="delivery-form"><input type="text" id="customerName" class="form-input" placeholder="Full Name"><input type="tel" id="customerMobile" class="form-input" placeholder="Mobile Number"><textarea id="customerAddress" class="form-input" rows="2" placeholder="Delivery Address"></textarea></div>
        </div>
        <div class="customer-details-summary" id="customerSummary"></div>
        <div id="cartItemsList" class="cart-items"></div>
        <div class="cart-total"><span>Total:</span><span class="total-amount" id="cartTotalAmount">₹0</span></div>
        <button class="btn-whatsapp" id="whatsappOrderBtn">📱 Order via WhatsApp</button>
        <button class="btn-clear" id="clearCartBtn">Clear Cart</button>
    </div>
</div>

    let cart = [];
    let currentFilterType = "veg";
    let deliveryType = "restaurant";
    
    function getFilteredItems() {
        if(currentFilterType === "veg") return vegMenuItems;
        if(currentFilterType === "nonveg") return nonVegMenuItems;
        return [...vegMenuItems, ...nonVegMenuItems];
    }
    
    function isVegItem(item) { return item.tags && item.tags.includes("Veg"); }
    
    function renderMenu() {
        let items = getFilteredItems();
        const grid = document.getElementById("menuGrid");
        if(items.length === 0) { grid.innerHTML = '<p style="text-align:center;color:var(--muted);grid-column:1/-1;">No items found</p>'; return; }
        
        grid.innerHTML = items.map(item => {
            const cartItem = cart.find(c => c.id === item.id);
            const quantity = cartItem ? cartItem.quantity : 0;
            const isVeg = isVegItem(item);
            const tagClass = isVeg ? 'veg-tag-pill' : 'nonveg-tag-pill';
            const typeTag = isVeg ? '🌱 VEG' : '🍗 NON-VEG';
            
            return `
            <div class="card">
                <div class="card-header">
                    <div class="thumb"><img src="${item.img}" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22140%22%20height%3D%22140%22%3E%3Crect%20width%3D%22100%25%22%20height%3D%22100%25%22%20fill%3D%22%23333%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20fill%3D%22%23999%22%3ENo%20Img%3C%2Ftext%3E%3C%2Fsvg%3E'"></div>
                    <div class="card-info">
                        <h3 class="dish">${item.name}</h3>
                        <p class="desc">${item.desc}</p>
                        <div class="tags" style="margin-top: 8px;">
                            <span class="pill ${tagClass}">${typeTag}</span>
                            ${item.tags.filter(t => t !== 'Veg' && t !== 'Non-Veg').slice(0,2).map(t => `<span class="pill">${t}</span>`).join('')}
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <div class="price">${item.price}</div>
                    <div class="cart-qty-control">
                        <button class="qty-btn decrement" data-id="${item.id}" data-name="${item.name.replace(/'/g, "\\'")}" data-price="${item.price}">-</button>
                        <span class="qty-number" id="qty-${item.id}">${quantity}</span>
                        <button class="qty-btn increment" data-id="${item.id}" data-name="${item.name.replace(/'/g, "\\'")}" data-price="${item.price}">+</button>
                    </div>
                </div>
            </div>`;
        }).join('');
        
        document.querySelectorAll('.increment').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                const name = btn.dataset.name;
                const price = btn.dataset.price;
                addToCart(id, name, price);
            });
        });
        document.querySelectorAll('.decrement').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                removeFromCartById(id);
            });
        });
    }
    
    function addToCart(id, name, priceStr) {
        const existing = cart.find(i => i.id === id);
        if(existing) existing.quantity += 1;
        else cart.push({ id, name, price: priceStr, quantity: 1 });
        updateCartUI();
        renderMenu();
    }
    
    function removeFromCartById(id) {
        const idx = cart.findIndex(i => i.id === id);
        if(idx !== -1) {
            if(cart[idx].quantity > 1) cart[idx].quantity -= 1;
            else cart.splice(idx,1);
        }
        updateCartUI();
        renderMenu();
    }
    
    function updateCartUI() {
        const totalItems = cart.reduce((sum,i)=>sum+i.quantity,0);
        document.getElementById('cartCount').innerText = totalItems;
        const cartContainer = document.getElementById('cartItemsList');
        if(cart.length === 0) { cartContainer.innerHTML = '<div class="cart-empty">Your cart is empty</div>'; document.getElementById('cartTotalAmount').innerText = '₹0'; return; }
        let html = '';
        let total = 0;
        cart.forEach(item => {
            const priceNum = parseInt(item.price.replace('₹',''));
            const itemTotal = priceNum * item.quantity;
            total += itemTotal;
            html += `<div class="cart-item">
                        <div><div class="item-name">${item.name}</div><div class="item-price">${item.price}</div></div>
                        <div class="cart-item-qty">
                            <button class="cart-qty-btn" data-id="${item.id}" data-delta="-1">-</button>
                            <span>${item.quantity}</span>
                            <button class="cart-qty-btn" data-id="${item.id}" data-delta="1">+</button>
                            <button class="cart-qty-btn" data-id="${item.id}" data-remove="1" style="color:#e74c3c;">🗑️</button>
                        </div>
                    </div>`;
        });
        cartContainer.innerHTML = html;
        document.getElementById('cartTotalAmount').innerHTML = `₹${total}`;
        document.querySelectorAll('.cart-qty-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                const delta = parseInt(btn.dataset.delta);
                if(btn.dataset.remove) { cart = cart.filter(i => i.id !== id); updateCartUI(); renderMenu(); return; }
                const item = cart.find(i => i.id === id);
                if(item) {
                    item.quantity += delta;
                    if(item.quantity <= 0) cart = cart.filter(i => i.id !== id);
                    updateCartUI();
                    renderMenu();
                }
            });
        });
    }
    
    function filterByDiet(type) {
        currentFilterType = type;
        document.querySelectorAll('.veg, .nonveg').forEach(el => el.classList.remove('active-filter'));
        if(type === 'veg') document.querySelector('.veg').classList.add('active-filter');
        if(type === 'nonveg') document.querySelector('.nonveg').classList.add('active-filter');
        renderMenu();
    }
    
    function updateCustomerSummary() {
        const summaryDiv = document.getElementById('customerSummary');
        if(deliveryType === 'restaurant') {
            const table = document.getElementById('tableNumber').value;
            if(table) summaryDiv.innerHTML = `<div><strong>🏨 Dine-in</strong><br/>Table: ${table}</div>`;
            else { summaryDiv.innerHTML = ''; summaryDiv.classList.remove('active'); return; }
            summaryDiv.classList.add('active');
        } else {
            const name = document.getElementById('customerName').value;
            const mobile = document.getElementById('customerMobile').value;
            const addr = document.getElementById('customerAddress').value;
            if(name || mobile || addr) summaryDiv.innerHTML = `<div><strong>🚚 Home Delivery</strong><br/>${name} | ${mobile}<br/>${addr}</div>`;
            else { summaryDiv.innerHTML = ''; summaryDiv.classList.remove('active'); return; }
            summaryDiv.classList.add('active');
        }
    }
    
    function selectDelivery(type) {
        deliveryType = type;
        document.getElementById('restaurantOptionBtn').classList.toggle('active', type === 'restaurant');
        document.getElementById('homeOptionBtn').classList.toggle('active', type === 'home');
        document.getElementById('restaurantForm').classList.toggle('active', type === 'restaurant');
        document.getElementById('homeDeliveryForm').classList.toggle('active', type === 'home');
        updateCustomerSummary();
    }
    
    document.getElementById('vegNonvegFilters').addEventListener('click', (e) => {
        const target = e.target.closest('[data-filter-type]');
        if(target) filterByDiet(target.dataset.filterType);
    });
    
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        let items = getFilteredItems();
        const filtered = items.filter(i => i.name.toLowerCase().includes(query) || i.desc.toLowerCase().includes(query));
        const grid = document.getElementById("menuGrid");
        if(filtered.length===0) grid.innerHTML = '<p style="text-align:center;">No items</p>';
        else {
            grid.innerHTML = filtered.map(item => {
                const cartItem = cart.find(c => c.id === item.id);
                const qty = cartItem ? cartItem.quantity : 0;
                const isVeg = isVegItem(item);
                const tagClass = isVeg ? 'veg-tag-pill' : 'nonveg-tag-pill';
                const typeTag = isVeg ? '🌱 VEG' : '🍗 NON-VEG';
                return `<div class="card"><div class="card-header"><div class="thumb"><img src="${item.img}" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22140%22%20height%3D%22140%22%3E%3Crect%20width%3D%22100%25%22%20height%3D%22100%25%22%20fill%3D%22%23333%22%2F%3E%3C%2Fsvg%3E'"></div><div class="card-info"><h3 class="dish">${item.name}</h3><p class="desc">${item.desc}</p><div class="tags"><span class="pill ${tagClass}">${typeTag}</span></div></div></div><div class="card-footer"><div class="price">${item.price}</div><div class="cart-qty-control"><button class="qty-btn decrement" data-id="${item.id}" data-name="${item.name}" data-price="${item.price}">-</button><span>${qty}</span><button class="qty-btn increment" data-id="${item.id}" data-name="${item.name}" data-price="${item.price}">+</button></div></div></div>`;
            }).join('');
            document.querySelectorAll('.increment').forEach(b=>b.addEventListener('click',(e)=>{let d=b.dataset; addToCart(parseInt(d.id), d.name, d.price);}));
            document.querySelectorAll('.decrement').forEach(b=>b.addEventListener('click',(e)=>{removeFromCartById(parseInt(b.dataset.id));}));
        }
    });
    
    document.getElementById('cartButton').addEventListener('click',()=>{document.getElementById('cartModal').classList.add('open'); updateCustomerSummary();});
    document.getElementById('closeCart').addEventListener('click',()=>document.getElementById('cartModal').classList.remove('open'));
    document.getElementById('clearCartBtn').addEventListener('click',()=>{cart=[]; updateCartUI(); renderMenu();});
    document.getElementById('whatsappOrderBtn').addEventListener('click',()=>{
        if(cart.length===0){alert("Cart empty"); return;}
        let msg = "Hello! I would like to place an order:\n";
        if(deliveryType==='restaurant'){
            let table=document.getElementById('tableNumber').value;
            if(!table){alert("Please enter table number");return;}
            msg+=`*Dine-in* | Table: ${table}\n`;
        } else {
            let name=document.getElementById('customerName').value, mob=document.getElementById('customerMobile').value, addr=document.getElementById('customerAddress').value;
            if(!name||!mob||!addr){alert("Please fill all delivery details");return;}
            msg+=`*Home Delivery*\nName: ${name}\nMobile: ${mob}\nAddress: ${addr}\n`;
        }
        msg+=`\n*Order Items:*\n`;
        let total=0;
        cart.forEach(i=>{let p=parseInt(i.price.replace('₹','')); total+=p*i.quantity; msg+=`${i.name} x${i.quantity} = ${i.price} each\n`;});
        msg+=`\n*Total: ₹${total}*\nThank you!`;
        window.open(`https://wa.me/917777012727?text=${encodeURIComponent(msg)}`,'_blank');
    });
    document.getElementById('restaurantOptionBtn').addEventListener('click',()=>selectDelivery('restaurant'));
    document.getElementById('homeOptionBtn').addEventListener('click',()=>selectDelivery('home'));
    document.getElementById('tableNumber').addEventListener('input',updateCustomerSummary);
    document.getElementById('customerName').addEventListener('input',updateCustomerSummary);
    document.getElementById('customerMobile').addEventListener('input',updateCustomerSummary);
    document.getElementById('customerAddress').addEventListener('input',updateCustomerSummary);
    
    filterByDiet("veg");
    selectDelivery('restaurant');
</script>
</body>
</html>
