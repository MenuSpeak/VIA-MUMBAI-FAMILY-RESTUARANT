            padding: 0;

            left: 0;

            z-index: -1;

            height: 2px;

            gap: 12px;

            border-radius: 40px;

            border: 1px solid rgba(255,255,255,0.15);

            height: 32px;

</head>

    let cart = [];
    let currentFilterType = "veg";
    let deliveryType = "restaurant";
    
    function getFilteredItems() {
        if(currentFilterType === "veg") return vegMenuItems;
        if(currentFilterType === "nonveg") return nonVegMenuItems;
        return [...vegMenuItems, ...nonVegMenuItems];
    }
    
    function isVegItem(item) { return item.tags && item.tags.includes("Veg"); }
    
    function renderMenu() {
        let items = getFilteredItems();
        const grid = document.getElementById("menuGrid");
        if(items.length === 0) { grid.innerHTML = '<p style="text-align:center;color:var(--muted);grid-column:1/-1;">No items found</p>'; return; }
        
        grid.innerHTML = items.map(item => {
            const cartItem = cart.find(c => c.id === item.id);
            const quantity = cartItem ? cartItem.quantity : 0;
            const isVeg = isVegItem(item);
            const tagClass = isVeg ? 'veg-tag-pill' : 'nonveg-tag-pill';
            const typeTag = isVeg ? '🌱 VEG' : '🍗 NON-VEG';
            
            return `
            <div class="card">
                <div class="card-header">
                    <div class="thumb"><img src="${item.img}" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22140%22%20height%3D%22140%22%3E%3Crect%20width%3D%22100%25%22%20height%3D%22100%25%22%20fill%3D%22%23333%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20fill%3D%22%23999%22%3ENo%20Img%3C%2Ftext%3E%3C%2Fsvg%3E'"></div>
                    <div class="card-info">
                        <h3 class="dish">${item.name}</h3>
                        <p class="desc">${item.desc}</p>
                        <div class="tags" style="margin-top: 8px;">
                            <span class="pill ${tagClass}">${typeTag}</span>
                            ${item.tags.filter(t => t !== 'Veg' && t !== 'Non-Veg').slice(0,2).map(t => `<span class="pill">${t}</span>`).join('')}
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <div class="price">${item.price}</div>
                    <div class="cart-qty-control">
                        <button class="qty-btn decrement" data-id="${item.id}" data-name="${item.name.replace(/'/g, "\\'")}" data-price="${item.price}">-</button>
                        <span class="qty-number" id="qty-${item.id}">${quantity}</span>
                        <button class="qty-btn increment" data-id="${item.id}" data-name="${item.name.replace(/'/g, "\\'")}" data-price="${item.price}">+</button>
                    </div>
                </div>
            </div>`;
        }).join('');
        
        document.querySelectorAll('.increment').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                const name = btn.dataset.name;
                const price = btn.dataset.price;
                addToCart(id, name, price);
            });
        });
        document.querySelectorAll('.decrement').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                removeFromCartById(id);
            });
        });
    }
    
    function addToCart(id, name, priceStr) {
        const existing = cart.find(i => i.id === id);
        if(existing) existing.quantity += 1;
        else cart.push({ id, name, price: priceStr, quantity: 1 });
        updateCartUI();
        renderMenu();
    }
    
    function removeFromCartById(id) {
        const idx = cart.findIndex(i => i.id === id);
        if(idx !== -1) {
            if(cart[idx].quantity > 1) cart[idx].quantity -= 1;
            else cart.splice(idx,1);
        }
        updateCartUI();
        renderMenu();
    }
    
    function updateCartUI() {
        const totalItems = cart.reduce((sum,i)=>sum+i.quantity,0);
        document.getElementById('cartCount').innerText = totalItems;
        const cartContainer = document.getElementById('cartItemsList');
        if(cart.length === 0) { cartContainer.innerHTML = '<div class="cart-empty">Your cart is empty</div>'; document.getElementById('cartTotalAmount').innerText = '₹0'; return; }
        let html = '';
        let total = 0;
        cart.forEach(item => {
            const priceNum = parseInt(item.price.replace('₹',''));
            const itemTotal = priceNum * item.quantity;
            total += itemTotal;
            html += `<div class="cart-item">
                        <div><div class="item-name">${item.name}</div><div class="item-price">${item.price}</div></div>
                        <div class="cart-item-qty">
                            <button class="cart-qty-btn" data-id="${item.id}" data-delta="-1">-</button>
                            <span>${item.quantity}</span>
                            <button class="cart-qty-btn" data-id="${item.id}" data-delta="1">+</button>
                            <button class="cart-qty-btn" data-id="${item.id}" data-remove="1" style="color:#e74c3c;">🗑️</button>
                        </div>
                    </div>`;
        });
        cartContainer.innerHTML = html;
        document.getElementById('cartTotalAmount').innerHTML = `₹${total}`;
        document.querySelectorAll('.cart-qty-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                const delta = parseInt(btn.dataset.delta);
                if(btn.dataset.remove) { cart = cart.filter(i => i.id !== id); updateCartUI(); renderMenu(); return; }
                const item = cart.find(i => i.id === id);
                if(item) {
                    item.quantity += delta;
                    if(item.quantity <= 0) cart = cart.filter(i => i.id !== id);
                    updateCartUI();
                    renderMenu();
                }
            });
        });
    }
    
    function filterByDiet(type) {
        currentFilterType = type;
        document.querySelectorAll('.veg, .nonveg').forEach(el => el.classList.remove('active-filter'));
        if(type === 'veg') document.querySelector('.veg').classList.add('active-filter');
        if(type === 'nonveg') document.querySelector('.nonveg').classList.add('active-filter');
        renderMenu();
    }
    
    function updateCustomerSummary() {
        const summaryDiv = document.getElementById('customerSummary');
        if(deliveryType === 'restaurant') {
            const table = document.getElementById('tableNumber').value;
            if(table) summaryDiv.innerHTML = `<div><strong>🏨 Dine-in</strong><br/>Table: ${table}</div>`;
            else { summaryDiv.innerHTML = ''; summaryDiv.classList.remove('active'); return; }
            summaryDiv.classList.add('active');
        } else {
            const name = document.getElementById('customerName').value;
            const mobile = document.getElementById('customerMobile').value;
            const addr = document.getElementById('customerAddress').value;
            if(name || mobile || addr) summaryDiv.innerHTML = `<div><strong>🚚 Home Delivery</strong><br/>${name} | ${mobile}<br/>${addr}</div>`;
            else { summaryDiv.innerHTML = ''; summaryDiv.classList.remove('active'); return; }
            summaryDiv.classList.add('active');
        }
    }
    
    function selectDelivery(type) {
        deliveryType = type;
        document.getElementById('restaurantOptionBtn').classList.toggle('active', type === 'restaurant');
        document.getElementById('homeOptionBtn').classList.toggle('active', type === 'home');
        document.getElementById('restaurantForm').classList.toggle('active', type === 'restaurant');
        document.getElementById('homeDeliveryForm').classList.toggle('active', type === 'home');
        updateCustomerSummary();
    }
    
    document.getElementById('vegNonvegFilters').addEventListener('click', (e) => {
        const target = e.target.closest('[data-filter-type]');
        if(target) filterByDiet(target.dataset.filterType);
    });
    
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        let items = getFilteredItems();
        const filtered = items.filter(i => i.name.toLowerCase().includes(query) || i.desc.toLowerCase().includes(query));
        const grid = document.getElementById("menuGrid");
        if(filtered.length===0) grid.innerHTML = '<p style="text-align:center;">No items</p>';
        else {
            grid.innerHTML = filtered.map(item => {
                const cartItem = cart.find(c => c.id === item.id);
                const qty = cartItem ? cartItem.quantity : 0;
                const isVeg = isVegItem(item);
                const tagClass = isVeg ? 'veg-tag-pill' : 'nonveg-tag-pill';
                const typeTag = isVeg ? '🌱 VEG' : '🍗 NON-VEG';
                return `<div class="card"><div class="card-header"><div class="thumb"><img src="${item.img}" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22140%22%20height%3D%22140%22%3E%3Crect%20width%3D%22100%25%22%20height%3D%22100%25%22%20fill%3D%22%23333%22%2F%3E%3C%2Fsvg%3E'"></div><div class="card-info"><h3 class="dish">${item.name}</h3><p class="desc">${item.desc}</p><div class="tags"><span class="pill ${tagClass}">${typeTag}</span></div></div></div><div class="card-footer"><div class="price">${item.price}</div><div class="cart-qty-control"><button class="qty-btn decrement" data-id="${item.id}" data-name="${item.name}" data-price="${item.price}">-</button><span>${qty}</span><button class="qty-btn increment" data-id="${item.id}" data-name="${item.name}" data-price="${item.price}">+</button></div></div></div>`;
            }).join('');
            document.querySelectorAll('.increment').forEach(b=>b.addEventListener('click',(e)=>{let d=b.dataset; addToCart(parseInt(d.id), d.name, d.price);}));
            document.querySelectorAll('.decrement').forEach(b=>b.addEventListener('click',(e)=>{removeFromCartById(parseInt(b.dataset.id));}));
        }
    });
    
    document.getElementById('cartButton').addEventListener('click',()=>{document.getElementById('cartModal').classList.add('open'); updateCustomerSummary();});
    document.getElementById('closeCart').addEventListener('click',()=>document.getElementById('cartModal').classList.remove('open'));
    document.getElementById('clearCartBtn').addEventListener('click',()=>{cart=[]; updateCartUI(); renderMenu();});
    document.getElementById('whatsappOrderBtn').addEventListener('click',()=>{
        if(cart.length===0){alert("Cart empty"); return;}
        let msg = "Hello! I would like to place an order:\n";
        if(deliveryType==='restaurant'){
            let table=document.getElementById('tableNumber').value;
            if(!table){alert("Please enter table number");return;}
            msg+=`*Dine-in* | Table: ${table}\n`;
        } else {
            let name=document.getElementById('customerName').value, mob=document.getElementById('customerMobile').value, addr=document.getElementById('customerAddress').value;
            if(!name||!mob||!addr){alert("Please fill all delivery details");return;}
            msg+=`*Home Delivery*\nName: ${name}\nMobile: ${mob}\nAddress: ${addr}\n`;
        }
        msg+=`\n*Order Items:*\n`;
        let total=0;
        cart.forEach(i=>{let p=parseInt(i.price.replace('₹','')); total+=p*i.quantity; msg+=`${i.name} x${i.quantity} = ${i.price} each\n`;});
        msg+=`\n*Total: ₹${total}*\nThank you!`;
        window.open(`https://wa.me/917777012727?text=${encodeURIComponent(msg)}`,'_blank');
    });
    document.getElementById('restaurantOptionBtn').addEventListener('click',()=>selectDelivery('restaurant'));
    document.getElementById('homeOptionBtn').addEventListener('click',()=>selectDelivery('home'));
    document.getElementById('tableNumber').addEventListener('input',updateCustomerSummary);
    document.getElementById('customerName').addEventListener('input',updateCustomerSummary);
    document.getElementById('customerMobile').addEventListener('input',updateCustomerSummary);
    document.getElementById('customerAddress').addEventListener('input',updateCustomerSummary);
    
    filterByDiet("veg");
    selectDelivery('restaurant');
</script>
